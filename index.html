<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kamera Aufnahme</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f9fafb;
      color: #111827;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 20px;
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .camera-zone {
      width: 100%;
      max-width: 380px;
      margin-bottom: 20px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      background: #000;
    }

    canvas {
      display: none;
    }

    .status {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 14px;
      letter-spacing: -0.025em;
    }

    .hint {
      font-size: 15px;
      color: #6b7280;
      margin-top: 16px;
      font-weight: 400;
      line-height: 1.4;
    }

    .saving {
      color: #3b82f6;
    }

    .error {
      color: #ef4444;
    }

    button {
      width: 100%;
      max-width: 280px;
      padding: 16px 24px;
      font-size: 17px;
      font-weight: 600;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background-color: #3b82f6;
      color: white;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>

<body>

  <div class="container">
    <div id="status" class="status">Kamera wird gestartet...</div>

    <div class="camera-zone">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <canvas id="canvas"></canvas>

    <button id="retryBtn" onclick="initCamera()">Erneut versuchen</button>

    <div id="hint" class="hint">
      Bitte Kamera-Zugriff erlauben. Das Foto wird automatisch aufgenommen.
    </div>
  </div>

<script>
  let stream = null;
  let photoWasTaken = false;

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const statusDiv = document.getElementById("status");
  const hintDiv = document.getElementById("hint");
  const retryBtn = document.getElementById("retryBtn");

  window.addEventListener("DOMContentLoaded", () => {
    initCamera();
  });

  async function initCamera() {
    try {
      retryBtn.style.display = "none";
      statusDiv.textContent = "Kamera wird gestartet...";
      statusDiv.className = "status";
      hintDiv.textContent = "Bitte Kamera-Zugriff erlauben. Das Foto wird automatisch aufgenommen.";
      photoWasTaken = false;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("Kamera wird in diesem Browser nicht unterstützt.");
      }

      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: "user",
          width: { ideal: 640 },
          height: { ideal: 480 }
        },
        audio: false
      });

      video.srcObject = stream;

      video.onloadedmetadata = async function () {
        await video.play();

        statusDiv.textContent = "Kamera bereit...";
        hintDiv.textContent = "Bitte kurz stillhalten.";

        waitUntilVideoHasRealFrame();
      };

    } catch (err) {
      console.error("Camera runtime block exception:", err);

      statusDiv.textContent = "Kamera-Berechtigung nötig";
      statusDiv.className = "status error";
      hintDiv.textContent = "Bitte Kamera-Zugriff im Browser erlauben und erneut versuchen.";
      retryBtn.style.display = "block";
    }
  }

  function waitUntilVideoHasRealFrame() {
    let tries = 0;
    const maxTries = 80;

    const interval = setInterval(() => {
      tries++;

      const hasRealFrame =
        video.readyState >= 2 &&
        video.videoWidth > 0 &&
        video.videoHeight > 0;

      console.log("Video check:", {
        readyState: video.readyState,
        width: video.videoWidth,
        height: video.videoHeight,
        tries: tries
      });

      if (hasRealFrame && !photoWasTaken) {
        clearInterval(interval);

        statusDiv.textContent = "Foto wird aufgenommen...";

        setTimeout(() => {
          capturePhoto();
        }, 1500);
      }

      if (tries >= maxTries) {
        clearInterval(interval);

        statusDiv.textContent = "Kamera nicht bereit";
        statusDiv.className = "status error";
        hintDiv.textContent = "Bitte erneut versuchen.";
        retryBtn.style.display = "block";
      }
    }, 100);
  }

  function capturePhoto() {
    if (photoWasTaken) return;

    if (!stream || video.videoWidth <= 0 || video.videoHeight <= 0) {
      statusDiv.textContent = "Kamera noch nicht bereit";
      statusDiv.className = "status error";
      hintDiv.textContent = "Bitte erneut versuchen.";
      retryBtn.style.display = "block";
      return;
    }

    photoWasTaken = true;

    statusDiv.textContent = "Foto wird gespeichert...";
    statusDiv.className = "status saving";
    hintDiv.textContent = "Foto wird an die Zeiterfassung übertragen.";

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const context = canvas.getContext("2d");
    context.drawImage(video, 0, 0, canvas.width, canvas.height);

    const base64DataUrl = canvas.toDataURL("image/png");

    console.log("Base64 Anfang:", base64DataUrl.substring(0, 50));
    console.log("Base64 Länge:", base64DataUrl.length);

    if (!base64DataUrl || base64DataUrl === "data:," || base64DataUrl.length < 1000) {
      photoWasTaken = false;
      statusDiv.textContent = "Foto war leer";
      statusDiv.className = "status error";
      hintDiv.textContent = "Bitte erneut versuchen.";
      retryBtn.style.display = "block";
      return;
    }

    if (window.opener) {
      window.opener.postMessage({
        type: "CAMERA_CAPTURE_SUCCESS",
        base64DataUrl: base64DataUrl
      }, "*");
    }

    stopCamera();

    setTimeout(() => {
      window.close();
    }, 700);
  }

  function stopCamera() {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
      stream = null;
    }
  }

  window.addEventListener("beforeunload", () => {
    stopCamera();
  });
</script>
</body>

</html>
